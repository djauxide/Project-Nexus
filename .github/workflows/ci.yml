name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/api/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Lint TypeScript
        run: cd backend/api && npm ci && npm run lint

      - name: Lint Go
        run: cd backend/services/switcher && gofmt -d . | tee /tmp/gofmt.out && test ! -s /tmp/gofmt.out

      - name: Lint Rust
        run: cd backend/services/router && cargo fmt -- --check && cargo clippy -- -D warnings

      - name: Lint Python
        run: cd backend/services/nmos && pip install flake8 && flake8 src/ --max-line-length=120

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: nexus_test
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test API
        run: cd backend/api && npm ci && npm test
        env:
          DATABASE_URL: postgres://nexus:test@localhost:5432/nexus_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret

      - name: Test Switcher
        run: cd backend/services/switcher && go test -v -race -coverprofile=coverage.out ./...

      - name: Test Router
        run: cd backend/services/router && cargo test

      - name: Test NMOS
        run: |
          cd backend/services/nmos
          pip install -r requirements.txt
          python -m pytest src/ -v

  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api, switcher, router, nmos, web]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Resolve context
        id: ctx
        run: |
          case "${{ matrix.service }}" in
            web) echo "context=frontend/web" >> $GITHUB_OUTPUT ;;
            api) echo "context=backend/api" >> $GITHUB_OUTPUT ;;
            *)   echo "context=backend/services/${{ matrix.service }}" >> $GITHUB_OUTPUT ;;
          esac

      - uses: docker/build-push-action@v5
        with:
          context: ${{ steps.ctx.outputs.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif

      - uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: trivy-results.sarif

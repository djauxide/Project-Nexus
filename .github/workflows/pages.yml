name: Deploy NEXUS v6 to GitHub Pages

on:
  push:
    branches: [main, v5-clean]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site
          cp nexus-v6.html _site/index.html
          # Also copy to docs/ as fallback for branch-based Pages source
          mkdir -p docs
          cp nexus-v6.html docs/index.html

      - name: Commit docs/index.html for branch-based Pages fallback
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "chore: sync docs/index.html from nexus-v6.html [skip ci]"
          git push || true

      - uses: actions/configure-pages@v4
        continue-on-error: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deployment
        continue-on-error: true

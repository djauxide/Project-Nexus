name: Deploy NEXUS v7 to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync docs/index.html from nexus-v7.html
        run: |
          cp nexus-v7.html docs/index.html
          cp nexus-v7.html docs/nexus-v7.html
          touch docs/.nojekyll
          touch .nojekyll

      - name: Commit and push docs sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/nexus-v7.html docs/.nojekyll .nojekyll
          git diff --staged --quiet || git commit -m "chore: sync docs from nexus-v7.html [skip ci]"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

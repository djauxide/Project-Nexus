<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NEXUS v6 — Broadcast Orchestration Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020208;--bg2:#05050f;--bg3:#080818;--bg4:#0b0b1e;--bg5:#0f0f28;
  --b1:#141430;--b2:#1c1c3a;--b3:#242448;--b4:#2e2e58;
  --acc:#00d4ff;--acc2:#0099bb;--acc3:#00ffcc;
  --pgm:#ff1a3a;--pvw:#00ff88;
  --warn:#ffaa00;--crit:#ff3355;--ok:#00ff88;
  --pur:#bb77ff;--gold:#ffcc33;--amber:#ff8800;
  --t1:#e0e0f0;--t2:#9090b0;--t3:#404060;
  --font:'Inter',sans-serif;--mono:'Share Tech Mono','Courier New',monospace;
  --display:'Rajdhani',sans-serif;
  --ease:.12s cubic-bezier(.4,0,.2,1);--r:5px;--r2:8px;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font);font-size:13px;color:var(--t1);-webkit-font-smoothing:antialiased}
button,select,input,textarea{font-family:var(--font)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--b3)}
a{color:var(--acc);text-decoration:none}
</style>

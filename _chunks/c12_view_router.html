<!-- VIEW: ROUTER -->
<div class="view" id="view-router">
  <div class="row" style="align-items:center;flex-wrap:nowrap">
    <div class="card-title" style="margin:0"><span class="ct-icon">⇄</span>Signal Router — 16×16</div>
    <div class="spacer" style="flex:1"></div>
    <button class="btn sm primary" onclick="lockAllRoutes()">🔒 Lock All</button>
    <button class="btn sm" onclick="clearRoutes()">✕ Clear</button>
    <button class="btn sm success" onclick="saveRoutePreset()">💾 Save Preset</button>
  </div>
  <div class="card">
    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      <div>
        <div style="font-size:10px;color:var(--t3);margin-bottom:4px;font-weight:600">SELECTED SOURCE</div>
        <div id="router-sel-src" style="font-family:var(--mono);font-size:13px;color:var(--acc);background:var(--b1);padding:4px 10px;border-radius:var(--r)">— none —</div>
      </div>
      <div>
        <div style="font-size:10px;color:var(--t3);margin-bottom:4px;font-weight:600">SELECTED DEST</div>
        <div id="router-sel-dst" style="font-family:var(--mono);font-size:13px;color:var(--pvw);background:var(--b1);padding:4px 10px;border-radius:var(--r)">— none —</div>
      </div>
      <button class="btn primary" style="align-self:flex-end" onclick="doRoute()">⇄ ROUTE</button>
    </div>
    <div id="router-matrix"></div>
  </div>
  <div class="row">
    <div class="card">
      <div class="card-title"><span class="ct-icon">💾</span>Route Presets</div>
      <div id="route-presets" style="display:flex;gap:6px;flex-wrap:wrap"></div>
    </div>
    <div class="card">
      <div class="card-title"><span class="ct-icon">📋</span>Active Routes</div>
      <div id="active-routes" style="font-size:11px;font-family:var(--mono);color:var(--t2)"></div>
    </div>
  </div>
</div>

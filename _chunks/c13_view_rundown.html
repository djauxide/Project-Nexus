<!-- VIEW: RUNDOWN -->
<div class="view" id="view-rundown">
  <div class="row" style="align-items:center;flex-wrap:nowrap">
    <div class="card-title" style="margin:0"><span class="ct-icon">📋</span>Rundown — Evening News</div>
    <div class="spacer" style="flex:1"></div>
    <span style="font-family:var(--mono);font-size:12px;color:var(--t2)">Total: <span id="rd-total">00:28:30</span></span>
    <button class="btn sm primary" onclick="addRundownItem()">+ Add Item</button>
    <button class="btn sm success" onclick="saveRundown()">💾 Save</button>
  </div>
  <div class="card" style="flex:1;overflow:auto">
    <table class="rundown-table" id="rundown-table">
      <thead><tr>
        <th>#</th><th>ITEM</th><th>TYPE</th><th>SOURCE</th><th>DUR</th><th>BACK TIME</th><th>STATUS</th><th></th>
      </tr></thead>
      <tbody id="rundown-body"></tbody>
    </table>
  </div>
  <div class="row">
    <div class="card">
      <div class="card-title"><span class="ct-icon">⏱</span>Show Clock</div>
      <div style="font-family:var(--mono);font-size:28px;color:var(--acc);text-align:center;padding:8px" id="show-clock">00:00:00</div>
      <div style="display:flex;gap:6px;justify-content:center;margin-top:6px">
        <button class="btn sm success" onclick="startShow()">▶ Start</button>
        <button class="btn sm warn" onclick="pauseShow()" style="border-color:var(--warn);color:var(--warn)">⏸ Pause</button>
        <button class="btn sm danger" onclick="resetShow()">⏹ Reset</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title"><span class="ct-icon">📝</span>Notes</div>
      <textarea style="width:100%;background:var(--b1);border:1px solid var(--b2);color:var(--t1);padding:8px;border-radius:var(--r);font-size:12px;resize:none;height:80px" placeholder="Director notes..."></textarea>
    </div>
  </div>
</div>

<!-- VIEW: PTP -->
<div class="view" id="view-ptp">
  <div class="row">
    <div class="card" style="flex:1">
      <div class="card-title"><span class="ct-icon">⏱</span>PTP Grandmaster</div>
      <div class="ptp-clock" id="ptp-time">00:00:00.000000000</div>
      <div class="ptp-offset" id="ptp-offset">Offset: ±18 ns</div>
      <div style="margin-top:12px">
        <div class="status-row"><span class="dot ok"></span><span class="sr-label">GM Clock</span><span class="sr-val">LOCKED</span></div>
        <div class="status-row"><span class="dot ok"></span><span class="sr-label">Profile</span><span class="sr-val">SMPTE ST 2059-2</span></div>
        <div class="status-row"><span class="dot ok"></span><span class="sr-label">Domain</span><span class="sr-val">127</span></div>
        <div class="status-row"><span class="dot ok"></span><span class="sr-label">Announce Interval</span><span class="sr-val">1 pkt/s</span></div>
        <div class="status-row"><span class="dot warn"></span><span class="sr-label">Slave Count</span><span class="sr-val">14 devices</span></div>
      </div>
    </div>
    <div class="card" style="flex:2">
      <div class="card-title"><span class="ct-icon">📊</span>Slave Offsets</div>
      <div id="ptp-slaves"></div>
    </div>
  </div>
  <div class="row">
    <div class="card">
      <div class="card-title"><span class="ct-icon">📈</span>Offset History</div>
      <div class="scope-box" style="height:100px"><canvas id="ptp-graph" width="600" height="100"></canvas></div>
    </div>
  </div>
</div>

<!-- VIEW: NMOS -->
<div class="view" id="view-nmos">
  <div class="row">
    <div class="card" style="flex:1">
      <div class="card-title"><span class="ct-icon">🔗</span>NMOS Registry
        <span class="ct-sub"><span class="dot ok"></span> IS-04 Active</span>
      </div>
      <div id="nmos-nodes"></div>
    </div>
    <div class="card" style="flex:1">
      <div class="card-title"><span class="ct-icon">🔀</span>IS-05 Connections</div>
      <div id="nmos-connections"></div>
      <button class="btn sm primary" style="margin-top:8px" onclick="nmosMakeConnection()">+ Make Connection</button>
    </div>
    <div class="card" style="flex:1">
      <div class="card-title"><span class="ct-icon">📡</span>IS-07 Events</div>
      <div id="nmos-events" style="font-size:11px;font-family:var(--mono);color:var(--t2);max-height:200px;overflow-y:auto"></div>
    </div>
  </div>
</div>

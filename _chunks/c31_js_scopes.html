<script>
// ── SCOPES ─────────────────────────────────────────────────────────────────
function drawWaveform() {
  const c = document.getElementById('scope-wfm');
  if (!c) return;
  const ctx = c.getContext('2d');
  const w = c.width, h = c.height;
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,w,h);
  ctx.strokeStyle = 'rgba(0,255,136,.15)';
  ctx.lineWidth = 1;
  for (let y = 0; y <= h; y += h/10) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }
  ['rgba(0,255,136,.8)','rgba(0,212,255,.6)','rgba(255,204,51,.5)'].forEach((col,ci) => {
    ctx.strokeStyle = col; ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let x = 0; x < w; x++) {
      const t = x / w * Math.PI * 8;
      const noise = (Math.random() - .5) * 8;
      const y = h/2 - (Math.sin(t + ci) * h * .35 + noise);
      x === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.stroke();
  });
}

function drawVectorscope() {
  const c = document.getElementById('scope-vec');
  if (!c) return;
  const ctx = c.getContext('2d');
  const w = c.width, h = c.height, cx = w/2, cy = h/2, r = w/2 - 4;
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,w,h);
  ctx.strokeStyle = 'rgba(255,255,255,.1)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,r*.66,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,r*.33,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,.05)';
  for (let a = 0; a < 360; a += 30) {
    const rad = a * Math.PI/180;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(rad)*r, cy+Math.sin(rad)*r); ctx.stroke();
  }
  for (let i = 0; i < 200; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * r * .7;
    ctx.fillStyle = `rgba(0,255,136,${Math.random()*.6+.2})`;
    ctx.fillRect(cx + Math.cos(angle)*dist - 1, cy + Math.sin(angle)*dist - 1, 2, 2);
  }
}

function drawLoudness() {
  const c = document.getElementById('scope-loud');
  if (!c) return;
  const ctx = c.getContext('2d');
  const w = c.width, h = c.height;
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,w,h);
  const lufs = -14 + (Math.random() - .5) * 4;
  const barH = Math.min(h, (lufs + 60) / 60 * h);
  const grad = ctx.createLinearGradient(0,h,0,0);
  grad.addColorStop(0,'#00ff88'); grad.addColorStop(.6,'#ffaa00'); grad.addColorStop(1,'#ff1a3a');
  ctx.fillStyle = grad;
  ctx.fillRect(w*.1, h - barH, w*.8, barH);
  ctx.fillStyle = 'rgba(255,255,255,.7)';
  ctx.font = '11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`${lufs.toFixed(1)} LUFS`, w/2, 14);
}

function drawHistogram() {
  const c = document.getElementById('scope-hist');
  if (!c) return;
  const ctx = c.getContext('2d');
  const w = c.width, h = c.height;
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,w,h);
  const colors = ['rgba(0,212,255,.7)','rgba(0,255,136,.7)','rgba(255,26,58,.7)'];
  colors.forEach((col, ci) => {
    ctx.fillStyle = col;
    for (let x = 0; x < w; x += 2) {
      const t = x / w;
      const peak = Math.exp(-Math.pow((t - (.3 + ci*.2)) / .15, 2));
      const bh = peak * h * (.6 + Math.random() * .2);
      ctx.fillRect(x, h - bh, 1.5, bh);
    }
  });
}

function buildLoudnessMeters() {
  const el = document.getElementById('loudness-meters');
  if (!el) return;
  el.innerHTML = '';
  ['L','R','C','LFE','Ls','Rs'].forEach(ch => {
    const div = document.createElement('div');
    div.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:2px;flex:1';
    const lvl = 40 + Math.random() * 50;
    div.innerHTML = `<div style="flex:1;width:16px;background:var(--b2);border-radius:2px;overflow:hidden;position:relative">
      <div style="position:absolute;bottom:0;left:0;right:0;height:${lvl}%;background:linear-gradient(to top,#00ff88,#ffaa00 70%,#ff1a3a);border-radius:2px;transition:.1s"></div>
    </div><span style="font-size:9px;color:var(--t3)">${ch}</span>`;
    el.appendChild(div);
  });
}
</script>

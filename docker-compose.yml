version: '3.8'

services:
  # ── Frontend ──────────────────────────────────────────────────────────────
  web:
    build:
      context: ./frontend/web
      target: development
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8080
      - REACT_APP_WS_URL=ws://localhost:8080
    volumes:
      - ./frontend/web/src:/app/src
    depends_on:
      - api

  # ── API Gateway ───────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend/api
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - POSTGRES_URL=postgres://nexus:${POSTGRES_PASSWORD:-nexus}@postgres:5432/nexus
      - REDIS_URL=redis://redis:6379
      - MINIO_URL=http://minio:9000
      - NMOS_REGISTRY_URL=http://nmos:8010
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Microservices ─────────────────────────────────────────────────────────
  switcher:
    build:
      context: ./backend/services/switcher
    environment:
      - REDIS_URL=redis://redis:6379
      - SWITCHER_ID=VSW-01
      - ME_BANKS=4
      - INPUTS=32
    depends_on:
      - redis

  nmos:
    build:
      context: ./backend/services/nmos
    ports:
      - "8010:8010"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  recorder:
    build:
      context: ./backend/services/recorder
    environment:
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=nexus-recordings
      - S3_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - recordings:/data/recordings
    depends_on:
      - minio

  # ── Data Layer ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=nexus
      - POSTGRES_USER=nexus
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-nexus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init/postgres:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  influxdb:
    image: influxdb:2.7
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=nexus
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUX_PASSWORD:-nexus-influx}
      - DOCKER_INFLUXDB_INIT_ORG=nexus-broadcast
      - DOCKER_INFLUXDB_INIT_BUCKET=metrics
      - DOCKER_INFLUXDB_INIT_RETENTION=30d
    volumes:
      - influx_data:/var/lib/influxdb2
    ports:
      - "8086:8086"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Monitoring ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.2.0
    environment:
      - GF_SECURITY_ADMIN_USER=nexus
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-nexus}
    volumes:
      - ./monitoring/grafana:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - influxdb

volumes:
  postgres_data:
  redis_data:
  influx_data:
  minio_data:
  prometheus_data:
  grafana_data:
  recordings:

# linuxptp configuration for NEXUS v4 PTP Grandmaster
# SMPTE ST 2059-2 profile

[global]
# SMPTE ST 2059-2 domain
domainNumber            0
priority1               128
priority2               128
clockClass              6       # GNSS locked
clockAccuracy           0x21    # 100ns
offsetScaledLogVariance 0x4E5D

# Timing
logAnnounceInterval     1
logSyncInterval         -3      # 8 packets/sec (video)
logMinDelayReqInterval  0
announceReceiptTimeout  3

# Transport
network_transport       UDPv4
time_stamping           hardware

# Hardware timestamping interface
[eth0]
network_transport       UDPv4
delay_mechanism         E2E

apiVersion: v1
kind: Service
metadata:
  name: nexus-api
  namespace: nexus-broadcast
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app: nexus-api
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800  # 3h for WebSocket persistence

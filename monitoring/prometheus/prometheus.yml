global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: nexus-production

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: nexus-api
    static_configs:
      - targets: [api:8080]
    metrics_path: /metrics

  - job_name: nexus-router
    static_configs:
      - targets: [router:9090]
    scrape_interval: 5s

  - job_name: nexus-switcher
    static_configs:
      - targets: [switcher:9090]

  - job_name: nmos-registry
    static_configs:
      - targets: [nmos:8010]
    metrics_path: /metrics

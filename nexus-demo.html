<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NEXUS v4 — Broadcast Orchestration Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04040a;--bg2:#07070f;--bg3:#0b0b14;--bg4:#0f0f1a;--bg5:#141420;
  --b1:#181828;--b2:#20203a;--b3:#2a2a45;
  --acc:#00d4ff;--acc2:#0099bb;
  --pgm:#ff1a3a;--pgm2:#cc0022;
  --pvw:#00ff88;--pvw2:#00cc66;
  --warn:#ffaa00;--crit:#ff3355;--ok:#00ff88;
  --pur:#bb77ff;--gold:#ffcc33;--pink:#ff66aa;
  --t1:#d0d0e8;--t2:#8888aa;--t3:#44445a;--t4:#2a2a40;
  --font:'Rajdhani',sans-serif;--mono:'Share Tech Mono','Courier New',monospace;
  --ease:.15s cubic-bezier(.4,0,.2,1);
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font);font-size:13px;color:var(--t1);line-height:1.4}
button,select,input{font-family:var(--font)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* ── LOGIN ── */
#login{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
  background:var(--bg);background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%,rgba(0,212,255,.07) 0%,transparent 70%),
    repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(0,212,255,.015) 40px),
    repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(0,212,255,.015) 40px)}
.lg-wrap{width:400px}
.lg-logo{text-align:center;margin-bottom:36px}
.lg-nx{font-size:52px;font-weight:700;letter-spacing:12px;color:var(--acc);
  text-shadow:0 0 60px rgba(0,212,255,.5),0 0 120px rgba(0,212,255,.2);
  animation:logopulse 3s ease-in-out infinite}
@keyframes logopulse{0%,100%{text-shadow:0 0 60px rgba(0,212,255,.5),0 0 120px rgba(0,212,255,.2)}
  50%{text-shadow:0 0 80px rgba(0,212,255,.8),0 0 160px rgba(0,212,255,.35)}}
.lg-sub{font-size:9px;letter-spacing:5px;color:var(--t3);margin-top:6px;text-transform:uppercase}
.lg-box{background:var(--bg3);border:1px solid var(--b1);border-top:2px solid var(--acc);
  padding:28px 32px;border-radius:8px;box-shadow:0 32px 80px rgba(0,0,0,.7),0 0 0 1px rgba(0,212,255,.04)}
.lg-lbl{font-size:8px;letter-spacing:2.5px;color:var(--t3);text-transform:uppercase;margin-bottom:5px;display:block}
.lg-inp{width:100%;background:var(--bg2);border:1px solid var(--b2);color:var(--t1);
  padding:10px 12px;border-radius:4px;margin-bottom:14px;font-size:13px;outline:none;
  transition:border-color var(--ease)}
.lg-inp:focus{border-color:var(--acc)}
.lg-sel{width:100%;background:var(--bg2);border:1px solid var(--b2);color:var(--t1);
  padding:9px 10px;border-radius:4px;margin-bottom:18px;font-size:12px;outline:none;cursor:pointer}
.lg-btn{width:100%;background:var(--acc);color:#000;border:none;padding:12px;
  font-size:12px;font-weight:700;letter-spacing:4px;border-radius:4px;cursor:pointer;
  text-transform:uppercase;transition:all var(--ease)}
.lg-btn:hover{background:#33ddff;box-shadow:0 0 30px rgba(0,212,255,.5)}
.lg-err{color:var(--pgm);font-size:9px;letter-spacing:1px;margin-bottom:10px;display:none}
.lg-hint{color:var(--t3);font-size:9px;text-align:center;margin-top:10px;letter-spacing:1px}

/* ── APP SHELL ── */
#app{display:none;flex-direction:column;height:100vh}

/* ── TOPBAR ── */
#topbar{height:42px;display:flex;align-items:stretch;background:var(--bg2);
  border-bottom:1px solid var(--b1);flex-shrink:0;position:relative;z-index:200}
#topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,var(--acc) 30%,var(--acc) 70%,transparent 100%);opacity:.2}
.tb-brand{padding:0 18px;display:flex;align-items:center;gap:8px;border-right:1px solid var(--b1);flex-shrink:0}
.tb-brand-nx{font-size:18px;font-weight:700;letter-spacing:4px;color:var(--acc)}
.tb-brand-v{font-size:9px;color:var(--t3);letter-spacing:2px;margin-top:2px}
.tb-nav{display:flex;flex:1;overflow-x:auto}
.tb-nav::-webkit-scrollbar{height:0}
.nb{height:100%;padding:0 14px;font-size:9px;font-weight:700;letter-spacing:2px;
  border:none;background:transparent;color:var(--t3);cursor:pointer;
  border-bottom:2px solid transparent;transition:all var(--ease);white-space:nowrap;
  text-transform:uppercase;position:relative}
.nb:hover{color:var(--t1);background:rgba(255,255,255,.02)}
.nb.on{color:var(--acc);border-bottom-color:var(--acc);background:rgba(0,212,255,.03)}
.nb .badge{position:absolute;top:7px;right:5px;background:var(--pgm);color:#fff;
  font-size:7px;font-weight:700;padding:1px 3px;border-radius:6px;min-width:13px;text-align:center;display:none}
.tb-right{display:flex;align-items:center;gap:10px;padding:0 14px;border-left:1px solid var(--b1);flex-shrink:0}
.tb-role{font-size:8px;letter-spacing:2px;color:var(--t3);text-transform:uppercase}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-ok{background:var(--ok);box-shadow:0 0 6px var(--ok)}
.dot-pgm{background:var(--pgm);box-shadow:0 0 6px var(--pgm)}
.dot-pvw{background:var(--pvw);box-shadow:0 0 5px var(--pvw)}
.dot-warn{background:var(--warn);box-shadow:0 0 5px var(--warn)}
.dot-off{background:var(--t3)}
.dot-pulse{animation:dp 1.2s ease-in-out infinite}
@keyframes dp{0%,100%{opacity:1}50%{opacity:.3}}

/* ── STATUS BAR ── */
#sbar{height:26px;display:flex;align-items:stretch;background:var(--bg2);
  border-bottom:1px solid var(--b1);flex-shrink:0;font-size:10px;overflow:hidden}
.si{display:flex;align-items:center;gap:5px;padding:0 12px;border-right:1px solid var(--b1);flex-shrink:0;white-space:nowrap}
.si-lbl{font-size:8px;letter-spacing:1.5px;color:var(--t3);text-transform:uppercase}
.si-tc{font-family:var(--mono);font-size:11px;color:var(--ok);font-weight:400;letter-spacing:1px}
.si-pgm{color:var(--pgm);font-weight:700}
.si-pvw{color:var(--pvw);font-weight:700}
.si-ptp{color:var(--acc);font-size:9px}
.si-sp{flex:1}
.si-air{color:var(--pgm);font-size:9px;font-weight:700;letter-spacing:2px}
.si-role{padding:0 12px;font-size:8px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;display:flex;align-items:center}

/* ── MAIN ── */
#main{flex:1;overflow:hidden;position:relative}
.view{display:none;width:100%;height:100%;overflow:auto;flex-direction:column}
.view.on{display:flex}

/* ── PANELS ── */
.pnl{background:var(--bg3);border:1px solid var(--b1);border-radius:5px;overflow:hidden}
.pnl-h{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;
  background:var(--bg4);border-bottom:1px solid var(--b1);flex-shrink:0}
.pnl-t{font-size:8px;font-weight:700;letter-spacing:2.5px;color:var(--acc);text-transform:uppercase}
.pnl-b{padding:8px}

/* ── TABS ── */
.tbar{display:flex;background:var(--bg4);border-bottom:1px solid var(--b1);flex-shrink:0}
.tab{padding:8px 15px;font-size:8px;font-weight:700;letter-spacing:2px;color:var(--t3);
  cursor:pointer;border-bottom:2px solid transparent;transition:all var(--ease);
  text-transform:uppercase;white-space:nowrap;user-select:none}
.tab:hover{color:var(--t1);background:rgba(255,255,255,.02)}
.tab.on{color:var(--acc);border-bottom-color:var(--acc)}
.tp{display:none;flex:1;overflow:auto}.tp.on{display:block}

/* ── BUTTONS ── */
.btn{padding:4px 10px;font-size:9px;font-weight:700;letter-spacing:1px;border-radius:3px;
  border:1px solid var(--b2);background:var(--bg4);color:var(--t2);
  cursor:pointer;transition:all var(--ease);text-transform:uppercase;white-space:nowrap;user-select:none}
.btn:hover{border-color:var(--acc);color:var(--acc);background:rgba(0,212,255,.06)}
.btn:active{transform:scale(.97)}
.btn-pgm{border-color:var(--pgm)!important;background:rgba(255,26,58,.12)!important;color:var(--pgm)!important}
.btn-pvw{border-color:var(--pvw)!important;background:rgba(0,255,136,.08)!important;color:var(--pvw)!important}
.btn-acc{border-color:var(--acc)!important;background:rgba(0,212,255,.1)!important;color:var(--acc)!important}
.btn-warn{border-color:var(--warn)!important;background:rgba(255,170,0,.08)!important;color:var(--warn)!important}
.btn-pur{border-color:var(--pur)!important;background:rgba(187,119,255,.08)!important;color:var(--pur)!important}
.btn-gold{border-color:var(--gold)!important;background:rgba(255,204,51,.08)!important;color:var(--gold)!important}
.btn-lg{padding:8px 18px!important;font-size:11px!important;letter-spacing:2px!important}
.btn-xl{padding:11px 26px!important;font-size:12px!important;letter-spacing:3px!important}
.btn-sm{padding:2px 7px!important;font-size:8px!important}

/* ── BADGES ── */
.bx{display:inline-flex;align-items:center;padding:1px 6px;border-radius:8px;
  font-size:7px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.bx-ok{background:rgba(0,255,136,.1);color:var(--ok);border:1px solid rgba(0,255,136,.2)}
.bx-pgm{background:rgba(255,26,58,.15);color:var(--pgm);border:1px solid rgba(255,26,58,.3)}
.bx-pvw{background:rgba(0,255,136,.1);color:var(--pvw);border:1px solid rgba(0,255,136,.2)}
.bx-warn{background:rgba(255,170,0,.1);color:var(--warn);border:1px solid rgba(255,170,0,.2)}
.bx-acc{background:rgba(0,212,255,.08);color:var(--acc);border:1px solid rgba(0,212,255,.15)}
.bx-pur{background:rgba(187,119,255,.1);color:var(--pur);border:1px solid rgba(187,119,255,.2)}

/* ── MISC ── */
.lbl{font-size:8px;letter-spacing:1.5px;color:var(--t3);text-transform:uppercase}
.val{font-size:13px;font-weight:600;color:var(--t1)}
.mono{font-family:var(--mono)}
.sep{background:var(--b1);flex-shrink:0}
.sep-v{width:1px;align-self:stretch}
.sep-h{height:1px;width:100%;margin:6px 0}
.tag{display:inline-block;padding:1px 5px;border-radius:2px;font-size:7px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;background:var(--bg4);color:var(--t3);border:1px solid var(--b1)}
.inp{background:var(--bg2);border:1px solid var(--b2);color:var(--t1);
  padding:5px 9px;border-radius:3px;font-size:11px;outline:none;transition:border-color var(--ease)}
.inp:focus{border-color:var(--acc)}
.sel{background:var(--bg2);border:1px solid var(--b2);color:var(--t1);
  padding:4px 7px;border-radius:3px;font-size:10px;outline:none;cursor:pointer}
.sel:focus{border-color:var(--acc)}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .18s ease-out}

/* ── SCANLINE ── */
.scanline{position:fixed;top:0;left:0;right:0;height:1px;pointer-events:none;z-index:9997;
  background:linear-gradient(transparent,rgba(0,212,255,.04),transparent);
  animation:scan 10s linear infinite}
@keyframes scan{from{top:-2px}to{top:100vh}}

/* ── MOSAIC ── */
.mv-grid{display:grid;gap:3px;padding:6px;flex:1;min-height:0}
.mv-tile{position:relative;background:#000;border-radius:4px;overflow:hidden;
  cursor:pointer;border:2px solid transparent;transition:border-color .1s;aspect-ratio:16/9}
.mv-tile:hover{border-color:rgba(0,212,255,.35)}
.mv-tile.t-pgm{border-color:var(--pgm)!important;box-shadow:0 0 0 1px var(--pgm),inset 0 0 30px rgba(255,26,58,.08)}
.mv-tile.t-pvw{border-color:var(--pvw)!important;box-shadow:0 0 0 1px var(--pvw),inset 0 0 20px rgba(0,255,136,.06)}
.mv-tile.t-sel{border-color:var(--acc)!important;box-shadow:0 0 0 1px var(--acc)}
.tile-cv{width:100%;height:100%;display:block}
.tile-ov{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:4px;pointer-events:none}
.tile-lbl{font-size:9px;font-weight:700;letter-spacing:.5px;padding:2px 5px;
  background:rgba(0,0,0,.65);border-radius:2px;display:inline-block;backdrop-filter:blur(3px)}
.tile-bot{display:flex;align-items:center;justify-content:space-between}
.tile-tc{font-family:var(--mono);font-size:7px;color:rgba(255,255,255,.45);
  background:rgba(0,0,0,.5);padding:1px 4px;border-radius:2px}
.tile-bx{font-size:7px;font-weight:700;padding:1px 4px;border-radius:2px;letter-spacing:1px}
.tile-bx.pgm{background:var(--pgm);color:#fff}
.tile-bx.pvw{background:var(--pvw);color:#000}
.tile-menu{position:absolute;inset:0;background:rgba(4,4,10,.93);
  display:none;flex-direction:column;z-index:20;backdrop-filter:blur(10px)}
.mv-tile.menu-on .tile-menu{display:flex}
.tm-hdr{padding:6px 8px;border-bottom:1px solid var(--b1);font-size:8px;font-weight:700;
  letter-spacing:2px;color:var(--acc);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.tm-list{flex:1;overflow-y:auto;padding:3px}
.tm-grp{font-size:7px;letter-spacing:1.5px;color:var(--t3);padding:4px 7px 2px;text-transform:uppercase}
.tm-item{padding:5px 8px;border-radius:3px;cursor:pointer;font-size:10px;font-weight:600;
  display:flex;align-items:center;gap:7px;transition:background .08s;pointer-events:all}
.tm-item:hover{background:rgba(0,212,255,.08)}
.tm-item.cur{background:rgba(0,212,255,.12);color:var(--acc)}

/* ── SWITCHER ── */
.me-bank{background:var(--bg3);border:1px solid var(--b1);border-radius:5px;overflow:hidden;margin-bottom:6px}
.me-hdr{display:flex;align-items:center;gap:8px;padding:7px 11px;background:var(--bg4);border-bottom:1px solid var(--b1)}
.me-name{font-size:11px;font-weight:700;letter-spacing:3px}
.me-row{padding:7px 10px;border-bottom:1px solid var(--b1)}
.me-rlbl{font-size:7px;letter-spacing:2px;font-weight:700;margin-bottom:4px;text-transform:uppercase}
.src-grid{display:flex;flex-wrap:wrap;gap:2px}
.sb{padding:3px 7px;font-size:9px;font-weight:600;border-radius:2px;
  border:1px solid var(--b2);background:var(--bg2);color:var(--t3);
  cursor:pointer;transition:all .08s;letter-spacing:.3px;white-space:nowrap}
.sb:hover{border-color:var(--acc);color:var(--acc)}
.sb.pvw{background:rgba(0,255,136,.12);border-color:var(--pvw);color:var(--pvw);font-weight:700}
.sb.pgm{background:rgba(255,26,58,.12);border-color:var(--pgm);color:var(--pgm);font-weight:700;cursor:default}
.me-trans{padding:7px 10px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.trans-track{flex:1;height:4px;background:var(--b1);border-radius:2px;overflow:hidden;min-width:60px}
.trans-fill{height:100%;border-radius:2px;width:0%;transition:width .04s linear}

/* ── ROUTER ── */
.rt-table{border-collapse:collapse;font-size:9px;white-space:nowrap}
.rt-table th{background:var(--bg4);color:var(--t2);padding:4px 8px;
  border:1px solid var(--b1);font-weight:600;letter-spacing:.5px;position:sticky;top:0;z-index:2}
.rt-table th:first-child{left:0;z-index:3}
.rt-table td{border:1px solid var(--b1);padding:3px 6px;background:var(--bg2);
  text-align:center;cursor:pointer;transition:background .08s;min-width:50px}
.rt-table td:first-child{background:var(--bg4);color:var(--t2);font-weight:600;
  text-align:left;position:sticky;left:0;cursor:default;min-width:70px}
.rt-table td.xpt{background:rgba(0,212,255,.15);color:var(--acc);font-weight:700}
.rt-table td:not(:first-child):hover{background:rgba(0,212,255,.07)}

/* ── RACK ── */
.ru{display:flex;align-items:center;gap:7px;padding:4px 8px;border-radius:3px;
  border:1px solid var(--b1);background:var(--bg2);margin-bottom:2px;
  border-left:3px solid transparent;transition:border-color .1s}

/* ── ALARM ── */
.al-row{display:flex;align-items:center;gap:7px;padding:5px 9px;border-radius:3px;
  border-left:3px solid transparent;margin-bottom:2px;font-size:10px}

/* ── TALLY ── */
.tally-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:4px}
.tc{border-radius:4px;padding:8px;text-align:center;border:1px solid var(--b1);
  cursor:pointer;transition:all .1s;background:var(--bg2)}
.tc.pgm{background:rgba(255,26,58,.18);border-color:var(--pgm);box-shadow:0 0 14px rgba(255,26,58,.2)}
.tc.pvw{background:rgba(0,255,136,.1);border-color:var(--pvw)}
.tc.off{opacity:.45}

/* ── SCOPE ── */
.scope-wrap{background:#000;border-radius:4px;overflow:hidden}
.scope-cv{display:block;width:100%;height:100%}

/* ── KV TABLE ── */
.kv{width:100%}
.kv tr{border-bottom:1px solid var(--b1)}
.kv td{padding:5px 0;font-size:10px}
.kv td:first-child{color:var(--t3);font-size:8px;letter-spacing:1px;text-transform:uppercase;width:45%}
.kv td:last-child{color:var(--t1);font-weight:600;text-align:right}
</style>
</head>
<body>
<div class="scanline"></div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NEXUS v4 — Broadcast Orchestration Platform</title>
<style>*{box-sizing:border-box;margin:0;padding:0}
:root{--c-bg:#050507;--c-bg2:#08080c;--c-bg3:#0d0d14;--c-bg4:#12121a;
--c-border:#1a1a28;--c-border2:#252535;--c-accent:#00d4ff;--c-accent2:#0099cc;
--c-pgm:#ff2244;--c-pvw:#00ff88;--c-warn:#ffaa00;--c-crit:#ff3355;
--c-ok:#00ff88;--c-info:#00d4ff;--c-pur:#cc88ff;--c-gold:#ffcc44;
--c-text:#c8c8d8;--c-text2:#888899;--c-text3:#444455;
--font:"Rajdhani",monospace;--font-mono:"Courier New",monospace;
--trans:.12s cubic-bezier(.4,0,.2,1)}
@import url("https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap");
html,body{height:100%;overflow:hidden}
body{background:var(--c-bg);color:var(--c-text);font-family:var(--font);font-size:13px;line-height:1.4}
button,select,input{font-family:var(--font);font-size:12px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--c-border2);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:#333345}
#login-screen{position:fixed;inset:0;background:var(--c-bg);display:flex;align-items:center;justify-content:center;z-index:9999;
background-image:radial-gradient(ellipse at 50% 0%,rgba(0,212,255,.06) 0%,transparent 60%)}
.login-wrap{width:420px}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo .wordmark{font-size:42px;font-weight:700;letter-spacing:8px;color:var(--c-accent);
text-shadow:0 0 40px rgba(0,212,255,.4),0 0 80px rgba(0,212,255,.15)}
.login-logo .tagline{font-size:10px;letter-spacing:4px;color:var(--c-text3);margin-top:4px;text-transform:uppercase}
.login-box{background:var(--c-bg3);border:1px solid var(--c-border);border-top:2px solid var(--c-accent);
padding:32px;border-radius:8px;box-shadow:0 24px 80px rgba(0,0,0,.6),0 0 0 1px rgba(0,212,255,.05)}
.login-box label{display:block;font-size:9px;letter-spacing:2px;color:var(--c-text3);text-transform:uppercase;margin-bottom:6px}
.login-box input,.login-box select{width:100%;background:var(--c-bg2);border:1px solid var(--c-border2);
color:var(--c-text);padding:10px 12px;border-radius:4px;margin-bottom:16px;font-size:13px;
transition:border-color var(--trans);outline:none}
.login-box input:focus,.login-box select:focus{border-color:var(--c-accent)}
.login-btn{width:100%;background:var(--c-accent);color:#000;border:none;padding:12px;font-size:13px;
font-weight:700;border-radius:4px;letter-spacing:3px;cursor:pointer;transition:all var(--trans);
text-transform:uppercase}
.login-btn:hover{background:#33ddff;box-shadow:0 0 20px rgba(0,212,255,.4)}
.login-err{color:var(--c-pgm);font-size:10px;margin-bottom:12px;display:none;letter-spacing:1px}
.login-hint{color:var(--c-text3);font-size:9px;text-align:center;margin-top:12px;letter-spacing:1px}
#app{display:none;flex-direction:column;height:100vh;overflow:hidden}
#topbar{display:flex;align-items:center;gap:0;height:44px;background:var(--c-bg2);
border-bottom:1px solid var(--c-border);flex-shrink:0;position:relative;z-index:100}
#topbar::after{content:"";position:absolute;bottom:0;left:0;right:0;height:1px;
background:linear-gradient(90deg,transparent,var(--c-accent),transparent);opacity:.3}
.tb-logo{padding:0 20px;font-size:16px;font-weight:700;letter-spacing:4px;color:var(--c-accent);
white-space:nowrap;flex-shrink:0;border-right:1px solid var(--c-border)}
.tb-logo span{color:var(--c-text3);font-weight:400;font-size:10px;letter-spacing:2px;margin-left:6px}
.tb-nav{display:flex;height:100%;flex:1;overflow-x:auto}
.tb-nav::-webkit-scrollbar{height:0}
.nav-btn{height:100%;padding:0 16px;font-size:10px;font-weight:600;letter-spacing:2px;
border:none;background:transparent;color:var(--c-text3);cursor:pointer;
border-bottom:2px solid transparent;transition:all var(--trans);white-space:nowrap;
text-transform:uppercase;position:relative}
.nav-btn:hover{color:var(--c-text);background:rgba(255,255,255,.03)}
.nav-btn.active{color:var(--c-accent);border-bottom-color:var(--c-accent);background:rgba(0,212,255,.04)}
.nav-btn .nb-badge{position:absolute;top:8px;right:6px;background:var(--c-pgm);color:#fff;
font-size:7px;font-weight:700;padding:1px 4px;border-radius:8px;min-width:14px;text-align:center}
.tb-right{display:flex;align-items:center;gap:8px;padding:0 14px;flex-shrink:0;border-left:1px solid var(--c-border)}
#statusbar{display:flex;align-items:center;gap:0;height:28px;background:var(--c-bg2);
border-bottom:1px solid var(--c-border);flex-shrink:0;font-size:10px;overflow:hidden}
.sb-item{display:flex;align-items:center;gap:6px;padding:0 14px;height:100%;
border-right:1px solid var(--c-border);white-space:nowrap;flex-shrink:0}
.sb-tc{color:var(--c-ok);font-weight:700;letter-spacing:2px;font-family:var(--font-mono);font-size:11px}
.sb-pgm{color:var(--c-pgm);font-weight:600}
.sb-pvw{color:var(--c-pvw);font-weight:600}
.sb-ptp{color:var(--c-accent)}
.sb-label{color:var(--c-text3);font-size:9px;letter-spacing:1px;text-transform:uppercase}
.sb-spacer{flex:1}
.sb-role{margin-left:auto;padding:0 14px;color:var(--c-text3);font-size:9px;letter-spacing:2px;text-transform:uppercase}
#main{flex:1;overflow:hidden;position:relative}
.view{display:none;width:100%;height:100%;overflow:auto}
.view.active{display:flex;flex-direction:column}
.panel{background:var(--c-bg3);border:1px solid var(--c-border);border-radius:6px;overflow:hidden}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;
background:var(--c-bg4);border-bottom:1px solid var(--c-border);flex-shrink:0}
.panel-title{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--c-accent);text-transform:uppercase}
.panel-body{padding:10px}
.tab-bar{display:flex;border-bottom:1px solid var(--c-border);background:var(--c-bg4);flex-shrink:0}
.tab{padding:8px 16px;font-size:9px;font-weight:600;letter-spacing:2px;color:var(--c-text3);
cursor:pointer;border-bottom:2px solid transparent;transition:all var(--trans);
text-transform:uppercase;white-space:nowrap;user-select:none}
.tab:hover{color:var(--c-text);background:rgba(255,255,255,.02)}
.tab.active{color:var(--c-accent);border-bottom-color:var(--c-accent)}
.tab-panel{display:none;flex:1;overflow:auto}.tab-panel.active{display:block}
.btn{padding:4px 10px;font-size:9px;font-weight:600;letter-spacing:1px;border-radius:3px;
border:1px solid var(--c-border2);background:var(--c-bg4);color:var(--c-text2);
cursor:pointer;transition:all var(--trans);text-transform:uppercase;white-space:nowrap}
.btn:hover{border-color:var(--c-accent);color:var(--c-accent);background:rgba(0,212,255,.06)}
.btn-pgm{border-color:var(--c-pgm)!important;background:rgba(255,34,68,.1)!important;color:var(--c-pgm)!important}
.btn-pvw{border-color:var(--c-pvw)!important;background:rgba(0,255,136,.08)!important;color:var(--c-pvw)!important}
.btn-ac{border-color:var(--c-accent)!important;background:rgba(0,212,255,.1)!important;color:var(--c-accent)!important}
.btn-warn{border-color:var(--c-warn)!important;background:rgba(255,170,0,.08)!important;color:var(--c-warn)!important}
.btn-pur{border-color:var(--c-pur)!important;background:rgba(204,136,255,.08)!important;color:var(--c-pur)!important}
.btn-gold{border-color:var(--c-gold)!important;background:rgba(255,204,68,.08)!important;color:var(--c-gold)!important}
.btn-lg{padding:8px 20px!important;font-size:11px!important;letter-spacing:2px!important}
.btn-xl{padding:12px 28px!important;font-size:13px!important;letter-spacing:3px!important;font-weight:700!important}
.btn-icon{padding:4px 8px!important;font-size:11px!important}
.badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:10px;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.badge-ok{background:rgba(0,255,136,.12);color:var(--c-ok);border:1px solid rgba(0,255,136,.2)}
.badge-pgm{background:rgba(255,34,68,.15);color:var(--c-pgm);border:1px solid rgba(255,34,68,.3)}
.badge-pvw{background:rgba(0,255,136,.12);color:var(--c-pvw);border:1px solid rgba(0,255,136,.2)}
.badge-warn{background:rgba(255,170,0,.1);color:var(--c-warn);border:1px solid rgba(255,170,0,.2)}
.badge-crit{background:rgba(255,51,85,.15);color:var(--c-crit);border:1px solid rgba(255,51,85,.3)}
.badge-info{background:rgba(0,212,255,.08);color:var(--c-info);border:1px solid rgba(0,212,255,.15)}
.badge-pur{background:rgba(204,136,255,.1);color:var(--c-pur);border:1px solid rgba(204,136,255,.2)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-ok{background:var(--c-ok);box-shadow:0 0 6px var(--c-ok)}
.dot-pgm{background:var(--c-pgm);box-shadow:0 0 6px var(--c-pgm)}
.dot-warn{background:var(--c-warn);box-shadow:0 0 6px var(--c-warn)}
.dot-err{background:var(--c-crit);box-shadow:0 0 6px var(--c-crit)}
.dot-off{background:var(--c-text3)}
.dot-pulse{animation:dpulse 1s ease-in-out infinite}
@keyframes dpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}
.justify-between{justify-content:space-between}.gap4{gap:4px}.gap8{gap:8px}.gap12{gap:12px}
.flex1{flex:1}.shrink0{flex-shrink:0}.w100{width:100%}.h100{height:100%}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.p8{padding:8px}.p12{padding:12px}.p16{padding:16px}
.mb4{margin-bottom:4px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}
.ovx{overflow-x:auto}.ovy{overflow-y:auto}
.mono{font-family:var(--font-mono)}
.lbl{font-size:9px;letter-spacing:1px;color:var(--c-text3);text-transform:uppercase}
.val{font-size:13px;font-weight:600;color:var(--c-text)}
.sep{width:1px;background:var(--c-border);align-self:stretch;flex-shrink:0}
.mosaic-grid{display:grid;gap:3px;padding:8px;flex:1}
.mv-tile{position:relative;background:#000;border-radius:4px;overflow:hidden;cursor:pointer;
border:2px solid transparent;transition:border-color var(--trans);aspect-ratio:16/9}
.mv-tile:hover{border-color:rgba(0,212,255,.4)}
.mv-tile.pgm{border-color:var(--c-pgm)!important;box-shadow:0 0 0 1px var(--c-pgm),inset 0 0 20px rgba(255,34,68,.1)}
.mv-tile.pvw{border-color:var(--c-pvw)!important;box-shadow:0 0 0 1px var(--c-pvw),inset 0 0 20px rgba(0,255,136,.08)}
.mv-tile.selected{border-color:var(--c-accent)!important;box-shadow:0 0 0 1px var(--c-accent)}
.mv-tile .tile-video{width:100%;height:100%;object-fit:cover}
.mv-tile .tile-canvas{width:100%;height:100%;display:block}
.mv-tile .tile-overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:5px}
.mv-tile .tile-label{font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 6px;
background:rgba(0,0,0,.7);border-radius:2px;display:inline-block;backdrop-filter:blur(4px)}
.mv-tile .tile-status{display:flex;align-items:center;gap:4px;justify-content:space-between}
.mv-tile .tile-tc{font-family:var(--font-mono);font-size:8px;color:rgba(255,255,255,.5);
background:rgba(0,0,0,.5);padding:1px 4px;border-radius:2px}
.mv-tile .tile-badge{font-size:7px;font-weight:700;padding:1px 5px;border-radius:2px;letter-spacing:1px}
.mv-tile .tile-badge.pgm{background:var(--c-pgm);color:#fff}
.mv-tile .tile-badge.pvw{background:var(--c-pvw);color:#000}
.mv-tile .tile-vu{position:absolute;bottom:0;left:0;right:0;height:3px;display:flex;gap:1px;padding:0 2px}
.mv-tile .tile-vu-bar{flex:1;border-radius:1px;transition:background .1s}
.mv-tile .tile-src-menu{position:absolute;inset:0;background:rgba(5,5,7,.92);
display:none;flex-direction:column;z-index:10;backdrop-filter:blur(8px)}
.mv-tile.menu-open .tile-src-menu{display:flex}
.src-menu-hdr{padding:6px 8px;border-bottom:1px solid var(--c-border);font-size:9px;
font-weight:700;letter-spacing:2px;color:var(--c-accent);display:flex;justify-content:space-between;align-items:center}
.src-menu-list{flex:1;overflow-y:auto;padding:4px}
.src-menu-item{padding:5px 8px;border-radius:3px;cursor:pointer;font-size:10px;font-weight:600;
display:flex;align-items:center;gap:8px;transition:background var(--trans)}
.src-menu-item:hover{background:rgba(0,212,255,.08)}
.src-menu-item.active{background:rgba(0,212,255,.12);color:var(--c-accent)}
.me-bank{background:var(--c-bg3);border:1px solid var(--c-border);border-radius:6px;overflow:hidden;margin-bottom:8px}
.me-hdr{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--c-bg4);border-bottom:1px solid var(--c-border)}
.me-label{font-size:11px;font-weight:700;letter-spacing:3px}
.me-bus-row{padding:8px 10px;border-bottom:1px solid var(--c-border)}
.me-bus-label{font-size:8px;letter-spacing:2px;font-weight:700;margin-bottom:5px;text-transform:uppercase}
.src-grid{display:flex;flex-wrap:wrap;gap:3px}
.src-btn{padding:3px 7px;font-size:9px;font-weight:600;border-radius:2px;border:1px solid var(--c-border2);
background:var(--c-bg2);color:var(--c-text3);cursor:pointer;transition:all var(--trans);letter-spacing:.5px}
.src-btn:hover{border-color:var(--c-accent);color:var(--c-accent)}
.src-btn.pvw{background:rgba(0,255,136,.15);border-color:var(--c-pvw);color:var(--c-pvw);font-weight:700}
.src-btn.pgm{background:rgba(255,34,68,.15);border-color:var(--c-pgm);color:var(--c-pgm);font-weight:700;cursor:default}
.trans-bar{padding:8px 10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.trans-prog{height:4px;background:var(--c-border);border-radius:2px;overflow:hidden;margin:0 10px 6px}
.trans-fill{height:100%;border-radius:2px;transition:width .04s linear}
.router-matrix{overflow:auto;flex:1}
.router-matrix table{border-collapse:collapse;font-size:9px;white-space:nowrap}
.router-matrix th{background:var(--c-bg4);color:var(--c-text3);padding:4px 8px;
border:1px solid var(--c-border);font-weight:600;letter-spacing:1px;position:sticky;top:0;z-index:2}
.router-matrix th:first-child{left:0;z-index:3}
.router-matrix td{border:1px solid var(--c-border);padding:3px 6px;background:var(--c-bg2);
text-align:center;cursor:pointer;transition:background var(--trans);min-width:52px}
.router-matrix td:first-child{background:var(--c-bg4);color:var(--c-text2);font-weight:600;
text-align:left;position:sticky;left:0;cursor:default}
.router-matrix td.routed{background:rgba(0,212,255,.15);color:var(--c-accent);font-weight:700}
.router-matrix td:not(:first-child):hover{background:rgba(0,212,255,.08)}
.rack-unit{display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:3px;
border:1px solid var(--c-border);background:var(--c-bg2);margin-bottom:2px;
border-left:3px solid transparent;transition:all var(--trans)}
.rack-unit:hover{border-color:var(--c-border2)}
.alarm-row{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:3px;
border-left:3px solid transparent;margin-bottom:2px;font-size:10px}
.scope-wrap{background:#000;border-radius:4px;overflow:hidden;position:relative}
.scope-canvas{display:block;width:100%;height:100%}
.tally-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:4px}
.tally-cell{border-radius:4px;padding:8px;text-align:center;border:1px solid var(--c-border);
cursor:pointer;transition:all var(--trans);background:var(--c-bg2)}
.tally-cell.pgm{background:rgba(255,34,68,.2);border-color:var(--c-pgm);box-shadow:0 0 12px rgba(255,34,68,.2)}
.tally-cell.pvw{background:rgba(0,255,136,.12);border-color:var(--c-pvw)}
.tally-cell.off{opacity:.5}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(0,212,255,.3)}50%{box-shadow:0 0 20px rgba(0,212,255,.6)}}
@keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
.anim-fade{animation:fadeIn .2s ease-out}
.scanline{position:fixed;top:0;left:0;right:0;height:2px;
background:linear-gradient(transparent,rgba(0,212,255,.03),transparent);
animation:scanline 8s linear infinite;pointer-events:none;z-index:9998}
.vu-meter{display:flex;align-items:flex-end;gap:1px;height:40px}
.vu-bar{width:6px;border-radius:1px 1px 0 0;transition:height .06s ease-out}
.divider{height:1px;background:var(--c-border);margin:8px 0}
.tag{display:inline-block;padding:1px 6px;border-radius:2px;font-size:8px;font-weight:700;
letter-spacing:1px;text-transform:uppercase;background:var(--c-bg4);color:var(--c-text3);border:1px solid var(--c-border)}
.input-field{background:var(--c-bg2);border:1px solid var(--c-border2);color:var(--c-text);
padding:6px 10px;border-radius:3px;font-size:11px;outline:none;transition:border-color var(--trans)}
.input-field:focus{border-color:var(--c-accent)}
.select-field{background:var(--c-bg2);border:1px solid var(--c-border2);color:var(--c-text);
padding:5px 8px;border-radius:3px;font-size:10px;outline:none;cursor:pointer}
.select-field:focus{border-color:var(--c-accent)}
.tooltip{position:relative}.tooltip:hover::after{content:attr(data-tip);position:absolute;
bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--c-bg4);
border:1px solid var(--c-border2);color:var(--c-text);font-size:9px;padding:3px 8px;
border-radius:3px;white-space:nowrap;z-index:1000;pointer-events:none}</style>
</head>
<body>
<div class="scanline"></div>
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="wordmark">NEXUS</div>
      <div class="tagline">Broadcast Orchestration Platform v4</div>
    </div>
    <div class="login-box">
      <div class="login-err" id="login-err">AUTHENTICATION FAILED</div>
      <label>Access Code</label>
      <input type="password" id="pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
      <label>Operator Role</label>
      <select id="role-sel" class="select-field" style="width:100%;margin-bottom:16px">
        <option value="ENGINEER">ENGINEER — Full System Access</option>
        <option value="OPERATOR">OPERATOR — Production Control</option>
        <option value="VIEWER">VIEWER — Monitor Only</option>
      </select>
      <button class="login-btn" onclick="doLogin()">AUTHENTICATE</button>
      <div class="login-hint">Demo access code: nexus2024</div>
    </div>
  </div>
</div>
<div id="app">
  <div id="topbar">
    <div class="tb-logo">NEXUS<span>v4</span></div>
    <div class="tb-nav"><button class="nav-btn" id="nav-live" onclick="showView('live')">LIVE</button><button class="nav-btn" id="nav-mosaic" onclick="showView('mosaic')">MOSAIC</button><button class="nav-btn" id="nav-switcher" onclick="showView('switcher')">SWITCH</button><button class="nav-btn" id="nav-router" onclick="showView('router')">ROUTER</button><button class="nav-btn" id="nav-cloudmcr" onclick="showView('cloudmcr')">CLOUD MCR</button><button class="nav-btn" id="nav-cloudsrt" onclick="showView('cloudsrt')">CLOUD/SRT</button><button class="nav-btn" id="nav-scopes" onclick="showView('scopes')">SCOPES</button><button class="nav-btn" id="nav-ptp" onclick="showView('ptp')">SYNC</button><button class="nav-btn" id="nav-nmos" onclick="showView('nmos')">CONNECT</button><button class="nav-btn" id="nav-devices" onclick="showView('devices')">DEVICES</button><button class="nav-btn" id="nav-api" onclick="showView('api')">API</button><button class="nav-btn" id="nav-predeploy" onclick="showView('predeploy')">PRE-FLIGHT</button></div>
    <div class="tb-right">
      <span id="tb-role" class="lbl" style="letter-spacing:2px"></span>
      <span class="dot dot-ok dot-pulse"></span>
    </div>
  </div>
  <div id="statusbar">

var _liveCanvIv=null;
function startLiveCanvases(){
  var pgm=document.getElementById('cv-pgm');
  var pvw=document.getElementById('cv-pvw');
  if(!pgm||!pvw)return;
  function drawMonitor(cv,color,label,phase){
    var ctx=cv.getContext('2d');
    var w=cv.offsetWidth||320,h=cv.offsetHeight||180;
    cv.width=w;cv.height=h;
    ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);
    var t=Date.now()/1000;
    for(var i=0;i<6;i++){
      var x=Math.sin(t*0.7+i*1.1+phase)*w*0.3+w*0.5;
      var y=Math.cos(t*0.5+i*0.9+phase)*h*0.3+h*0.5;
      var r=Math.abs(Math.sin(t*0.3+i))*60+20;
      var g=ctx.createRadialGradient(x,y,0,x,y,r);
      g.addColorStop(0,color+'33');g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
    }
    ctx.strokeStyle=color+'22';ctx.lineWidth=1;
    for(var row=0;row<h;row+=8){ctx.beginPath();ctx.moveTo(0,row);ctx.lineTo(w,row);ctx.stroke();}
    ctx.fillStyle='rgba(0,0,0,.3)';ctx.fillRect(0,0,w,h);
  }
  function drawVU(cvId,phase){
    var cv=document.getElementById(cvId); if(!cv)return;
    var ctx=cv.getContext('2d');
    var w=cv.offsetWidth||200;
    cv.width=w;cv.height=20;
    var bars=16;var bw=Math.floor(w/bars)-1;
    for(var i=0;i<bars;i++){
      var lvl=Math.max(0,Math.min(1,(Math.sin(Date.now()/300+i*0.4+phase)+1)/2*0.9));
      var color=i<10?'#00ff88':i<13?'#ffaa00':'#ff2244';
      ctx.fillStyle='#111';ctx.fillRect(i*(bw+1),0,bw,20);
      ctx.fillStyle=color;ctx.fillRect(i*(bw+1),20-Math.round(lvl*20),bw,Math.round(lvl*20));
    }
  }
  if(_liveCanvIv)clearInterval(_liveCanvIv);
  _liveCanvIv=setInterval(function(){
    drawMonitor(pgm,'#ff2244','PGM',0);
    drawMonitor(pvw,'#00ff88','PVW',2.5);
    drawVU('vu-pgm',0);drawVU('vu-pvw',1.2);
    var tc=document.getElementById('sb-tc');
    if(tc){
      var el1=document.getElementById('live-pgm-tc');
      var el2=document.getElementById('live-pvw-tc');
      if(el1)el1.textContent=tc.textContent;
      if(el2)el2.textContent=tc.textContent;
    }
    var cpu=document.getElementById('pill-cpu');
    if(cpu)cpu.textContent=Math.round(30+Math.sin(Date.now()/4000)*8)+'%';
    var net=document.getElementById('pill-net');
    if(net)net.textContent=(2.2+Math.sin(Date.now()/3000)*0.4).toFixed(1)+'Gbps';
  },50);
  _iv.push(_liveCanvIv);
}

function startMosaicCanvases(){
  var phases={};
  MOSAIC_STATE.tiles.forEach(function(_,i){phases[i]=Math.random()*10;});
  if(_mosaicIv)clearInterval(_mosaicIv);
  _mosaicIv=setInterval(function(){
    MOSAIC_STATE.tiles.forEach(function(tile,i){
      var cv=document.getElementById('tile-cv-'+i); if(!cv)return;
      var w=cv.offsetWidth||160,h=cv.offsetHeight||90;
      if(cv.width!==w||cv.height!==h){cv.width=w;cv.height=h;}
      var ctx=cv.getContext('2d');
      var t=Date.now()/1000;
      var ph=phases[i]||0;
      if(tile.src==='BLK'||tile.src==='TST-03'){
        ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);
      } else if(tile.src==='TST-01'){
        var bars=['#c0c0c0','#c0c000','#00c0c0','#00c000','#c000c0','#c00000','#0000c0'];
        bars.forEach(function(c,bi){ctx.fillStyle=c;ctx.fillRect(bi*w/7,0,w/7,h);});
      } else {
        ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);
        var isPgm=SW.me[0].pgm===tile.src;
        var baseColor=isPgm?'255,34,68':SW.me[0].pvw===tile.src?'0,255,136':'0,180,220';
        for(var k=0;k<4;k++){
          var bx=Math.sin(t*0.6+k*1.3+ph)*w*0.35+w*0.5;
          var by=Math.cos(t*0.4+k*1.1+ph)*h*0.35+h*0.5;
          var br=Math.abs(Math.sin(t*0.2+k+ph))*40+15;
          var bg=ctx.createRadialGradient(bx,by,0,bx,by,br);
          bg.addColorStop(0,'rgba('+baseColor+',.25)');bg.addColorStop(1,'transparent');
          ctx.fillStyle=bg;ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fill();
        }
        ctx.strokeStyle='rgba('+baseColor+',.08)';ctx.lineWidth=1;
        for(var row=0;row<h;row+=6){ctx.beginPath();ctx.moveTo(0,row);ctx.lineTo(w,row);ctx.stroke();}
      }
      var tcEl=document.getElementById('tile-tc-'+i);
      var sbTc=document.getElementById('sb-tc');
      if(tcEl&&sbTc)tcEl.textContent=sbTc.textContent;
    });
  },50);
  _iv.push(_mosaicIv);
  document.addEventListener('click',function(){if(_mosaicMenuOpen>=0)closeTileMenu(null,_mosaicMenuOpen);});
}

function meCut(mi){

  SW.me[mi].pgm=SW.me[mi].pvw;
  SW.me[mi].pvw=tmp;
  if(mi===0){
    document.getElementById('sb-pgm').textContent=SW.me[0].pgm;

function meAuto(mi){
  if(!canOp())return;
  if(SW.me[mi].transRunning)return;
  var rateEl=document.getElementById('me'+mi+'-rate');
  SW.me[mi].transRate=rateEl?parseInt(rateEl.value):25;
  SW.me[mi].transRunning=true;
  SW.me[mi].trans=0;
  var btn=document.getElementById('me'+mi+'-auto');
  if(btn){btn.textContent='RUNNING...';btn.classList.add('btn-warn');}
  var iv=setInterval(function(){
    SW.me[mi].trans+=1/SW.me[mi].transRate;
    var fill=document.getElementById('me'+mi+'-fill');
    if(fill)fill.style.width=Math.min(100,SW.me[mi].trans*100)+'%';
    if(SW.me[mi].trans>=1){
      clearInterval(iv);
      SW.me[mi].transRunning=false;
      SW.me[mi].trans=0;
      meCut(mi);
      var b=document.getElementById('me'+mi+'-auto');
      if(b){b.textContent='AUTO TRANS';b.classList.remove('btn-warn');}
      var f=document.getElementById('me'+mi+'-fill');
      if(f)f.style.width='0%';
    }
  },40);
  _iv.push(iv);
}

function drawWaveform(){
  var cv=document.getElementById('cv-wfm'); if(!cv)return;
  var w=cv.offsetWidth||400,h=cv.offsetHeight||200;
  cv.width=w;cv.height=h;
  var ctx=cv.getContext('2d');
  ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='rgba(0,212,255,.15)';ctx.lineWidth=1;
  for(var i=0;i<=4;i++){var y=h*i/4;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
  ctx.strokeStyle='#00d4ff';ctx.lineWidth=1.5;ctx.beginPath();
  var t=Date.now()/1000;
  for(var x=0;x<w;x++){
    var v=Math.sin(x/w*Math.PI*8+t*2)*0.3+Math.sin(x/w*Math.PI*16+t*1.3)*0.15+0.5;
    v=Math.max(0,Math.min(1,v));
    if(x===0)ctx.moveTo(x,h*(1-v));else ctx.lineTo(x,h*(1-v));
  }
  ctx.stroke();
}

function drawVectorscope(){
  var cv=document.getElementById('cv-vec'); if(!cv)return;
  var w=cv.offsetWidth||200,h=cv.offsetHeight||200;
  cv.width=w;cv.height=h;
  var ctx=cv.getContext('2d');
  ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='rgba(0,212,255,.1)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(w/2,h/2,w*0.45,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(w/2,h/2,w*0.22,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,.05)';
  for(var a=0;a<360;a+=30){
    var rad=a*Math.PI/180;
    ctx.beginPath();ctx.moveTo(w/2,h/2);
    ctx.lineTo(w/2+Math.cos(rad)*w*0.45,h/2+Math.sin(rad)*w*0.45);ctx.stroke();
  }
  var t=Date.now()/1000;
  ctx.fillStyle='rgba(0,255,136,.6)';
  for(var i=0;i<80;i++){
    var ang=(i/80)*Math.PI*2+t*0.1;
    var r=(0.2+Math.sin(i*0.7+t)*0.15)*w*0.45;
    var px=w/2+Math.cos(ang)*r;
    var py=h/2+Math.sin(ang)*r;
    ctx.beginPath();ctx.arc(px,py,1.5,0,Math.PI*2);ctx.fill();
  }
}

function drawHistogram(){
  var cv=document.getElementById('cv-hist'); if(!cv)return;
  var w=cv.offsetWidth||400,h=cv.offsetHeight||200;
  cv.width=w;cv.height=h;
  var ctx=cv.getContext('2d');
  ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);
  var t=Date.now()/1000;
  var colors=['rgba(255,80,80,.7)','rgba(80,255,80,.7)','rgba(80,80,255,.7)'];
  colors.forEach(function(c,ci){
    ctx.fillStyle=c;
    for(var x=0;x<w;x++){
      var v=Math.max(0,Math.sin((x/w)*Math.PI*3+t*0.5+ci*1.2)*0.5+0.5)*h*0.8;
      ctx.fillRect(x,h-v,1,v);
    }
  });
}

  var el=document.getElementById('audio-meters'); if(!el)return;
  var t=Date.now()/1000;
  var channels=['L','R','C','LFE','Ls','Rs','L2','R2'];

    var lvl=Math.max(0,Math.min(1,(Math.sin(t*1.2+i*0.8)+1)/2*0.85));

  }).join('');
}

      '<span class="dot" style="background:'+col+'"></span>'+
      '<span style="flex:1;font-size:10px;font-weight:600">'+c.name+'</span>'+
      '<span style="font-size:9px;color:var(--c-text3)">'+c.detail+'</span>'+
      '<span class="badge" style="background:rgba(0,0,0,.3);color:'+col+';border-color:'+col+'">'+c.status.toUpperCase()+'</span>'+
    '</div>';
  });
  v.innerHTML=h+'</div></div></div>';
}

function initAll(){
  initLive();
  initMosaic();
  initSwitcher();
  initRouter();
  initCloudMCR();
  initCloudSRT();
  initScopes();
  initPTP();
  initNMOS();
  initDevices();
  initAPI();
  initPreFlight();
  addAlarm('ok','NEXUS v4 initialized');
  addAlarm('info','PTP locked ±1.2ns');
  addAlarm('warn','Viz Engine 2 CPU 88%');
}
</script>
